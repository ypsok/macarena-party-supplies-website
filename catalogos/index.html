<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogos | Macarena Party Supplies</title>
  <link rel="stylesheet" href="shared/catalogos.css?v=smart-cart-question-1">
</head>
<body>
  <header class="catalog-header">
    <a class="catalog-logo" href="./" aria-label="Macarena Party Supplies catálogos">
      <img src="../Website%20-%20Source/assets/macarena-simplified.png" alt="Macarena Party Supplies">
    </a>

    <div class="catalog-header-actions">
      <a class="catalog-button secondary" href="https://www.instagram.com/macarena_partygdl/">Instagram</a>
      <a class="catalog-button" href="https://wa.me/5213330438386">WhatsApp</a>
    </div>
  </header>

  <main class="catalog-shell">
    <section class="catalog-hero">
      <p class="eyebrow">CATÁLOGOS DIGITALES</p>
    </section>

    <section class="catalog-options" aria-label="Opciones de catálogo">
      <a class="catalog-option-card" href="../catalogo-personajes/">
        <span class="catalog-option-media">
          <img src="covers/personajes.png?v=755fc17" alt="" data-cover="personajes">
        </span>
        <span class="catalog-option-content">
          <strong>Catálogo de personajes</strong>
          <span>Explora referencias visuales para elegir estilo, tema o personaje.</span>
        </span>
      </a>

      <a class="catalog-option-card" href="../catalogo-contorno/">
        <span class="catalog-option-media">
          <img src="covers/contorno.png?v=755fc17" alt="" data-cover="contorno">
        </span>
        <span class="catalog-option-content">
          <strong>Catálogo de contorno</strong>
          <span>Consulta opciones de contorno, silueta y acabados para personalizar.</span>
        </span>
      </a>
    </section>
  </main>

  <footer class="catalog-footer">
    <small>Macarena Party Supplies™ 2026</small>
  </footer>

  <script src="shared/catalogos-menu.js" defer></script>
</body>
</html>
